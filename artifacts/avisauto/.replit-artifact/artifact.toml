kind = "web"
previewPath = "/"
title = "AVISAUTO.fr - Gestion d'Avis Google"
version = "1.0.0"
id = "artifacts/avisauto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21820
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/avisauto run dev"

[services.env]
PORT = "21820"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/avisauto", "run", "build"]
publicDir = "artifacts/avisauto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
