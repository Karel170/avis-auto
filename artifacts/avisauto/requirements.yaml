    description: "Abstract professional sleek medical blue and green gradient background with glassmorphism shapes, highly detailed"
    aspect_ratio: "16:9"
  - path: "artifacts/avisauto/public/images/empty-reviews.png"
    description: "Minimalist 3D illustration of a floating speech bubble with a star, soft lighting, professional SaaS aesthetic"
